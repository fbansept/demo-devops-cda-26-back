spring.config.import=file:./.env[.properties],optional:file:./.example.env[.properties]

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=${DDL_AUTO}

spring.sql.init.platform=${SQL_FILE}
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=${SQL_INIT_MODE}

spring.jpa.properties.jakarta.persistence.validation.mode=none

jwt.secret=${JWT_SECRET}